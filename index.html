<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מונדיאל 2026 — מעקב תוצאות</title>
<style>
:root{
  --bg:#0d1224;
  --bg2:#131a33;
  --card:#1a2342;
  --card2:#212c52;
  --border:#2c3a6b;
  --text:#e8ecf8;
  --muted:#8c97c0;
  --accent:#4d9fff;
  --gold:#f5c843;
  --green:#3ecf8e;
  --amber:#f5a843;
  --red:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
  min-height:100vh;
}
header{
  background:linear-gradient(135deg,#102046 0%,#1b2f6e 55%,#3b1f66 100%);
  padding:22px 16px 14px;
  text-align:center;
  border-bottom:1px solid var(--border);
}
header h1{font-size:1.7em;letter-spacing:.5px}
header h1 .ball{font-size:.9em}
header .sub{color:var(--muted);font-size:.92em;margin-top:5px}
.progress-wrap{max-width:430px;margin:12px auto 0}
.progress-bar{height:7px;background:#0e1530;border-radius:99px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s}
.progress-label{font-size:.8em;color:var(--muted);margin-top:5px}
.scen-bar{
  display:flex;justify-content:center;align-items:center;gap:7px;flex-wrap:wrap;
  margin-top:13px;
}
.scen-bar .scen-label{font-size:.85em;color:var(--muted)}
.scen-bar select{
  background:var(--card);color:var(--text);border:1px solid var(--border);
  border-radius:9px;padding:6px 10px;font-size:.92em;font-family:inherit;cursor:pointer;
  max-width:200px;
}
.scen-bar select:focus{outline:none;border-color:var(--accent)}
.scen-bar button{
  background:var(--card);color:var(--muted);border:1px solid var(--border);
  border-radius:9px;padding:6px 11px;font-size:.84em;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.scen-bar button:hover{color:var(--text);border-color:var(--accent)}
.scen-bar button.danger:hover{color:var(--red);border-color:var(--red);background:#3a1722}
.scen-bar button.ai{border-color:#4a3a6b;color:#b9a8e8}
.scen-bar button.ai:hover{color:#d9c8ff;border-color:#8a6ae8;background:#231a3d}
.champion-banner{
  margin:14px auto 0;max-width:520px;
  background:linear-gradient(135deg,#3d3007,#6b5512);
  border:1px solid var(--gold);border-radius:14px;
  padding:10px 18px;font-size:1.15em;font-weight:700;color:var(--gold);
}
nav{
  display:flex;justify-content:center;gap:6px;flex-wrap:wrap;
  padding:12px 8px;position:sticky;top:0;z-index:50;
  background:rgba(13,18,36,.93);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
nav button{
  background:var(--card);color:var(--muted);border:1px solid var(--border);
  border-radius:99px;padding:8px 18px;font-size:.95em;cursor:pointer;
  font-family:inherit;transition:all .15s;
}
nav button:hover{color:var(--text);border-color:var(--accent)}
nav button.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
nav button.reset{margin-inline-start:14px;border-color:#5a2b3a;color:#d98a9a}
nav button.reset:hover{background:#3a1722;color:var(--red);border-color:var(--red)}
main{max-width:1280px;margin:0 auto;padding:18px 12px 60px}
.note{color:var(--muted);font-size:.86em;margin:4px 0 14px;text-align:center}

/* group cards */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.group-card h2{
  background:var(--card2);padding:10px 16px;font-size:1.05em;
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;
}
.group-card h2 .done-tag{font-size:.72em;color:var(--green);font-weight:400}
.match-list{padding:8px 10px}
.match-row{
  display:flex;align-items:center;gap:6px;padding:6px 4px;
  border-bottom:1px dashed #232e57;font-size:.95em;
}
.match-row:last-child{border-bottom:none}
.match-row .team{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.match-row .team.t1{justify-content:flex-end;text-align:end}
.match-row .team .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-row .flag{font-size:1.25em;line-height:1}
.score-box{display:flex;align-items:center;gap:3px}
input.score{
  width:38px;height:32px;text-align:center;font-size:1em;font-family:inherit;
  background:#0e1530;color:var(--text);border:1px solid var(--border);border-radius:8px;
  -moz-appearance:textfield;appearance:textfield;
}
input.score::-webkit-outer-spin-button,input.score::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.score:focus{outline:none;border-color:var(--accent)}
input.score.filled{border-color:#3a5b3f;background:#11241b}
input.score.pen{width:30px;height:24px;font-size:.82em;border-color:#4a3a6b}
.match-meta{font-size:.7em;color:var(--muted);width:64px;text-align:center;flex-shrink:0}

/* tables */
table.standings{width:100%;border-collapse:collapse;font-size:.88em}
table.standings th{
  color:var(--muted);font-weight:500;padding:6px 4px;font-size:.85em;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--card2);
}
table.standings td{padding:6px 4px;text-align:center;border-bottom:1px solid #232e57}
table.standings tr:last-child td{border-bottom:none}
table.standings td.team-cell{text-align:start;white-space:nowrap}
table.standings td.pts{font-weight:700}
tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--green)}
tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--amber)}
tr.q1 td.pos{color:var(--green);font-weight:700}
tr.q3 td.pos{color:var(--amber);font-weight:700}
tr.out td{opacity:.62}

/* thirds */
.thirds-wrap{max-width:680px;margin:0 auto}
.legend{display:flex;gap:18px;justify-content:center;margin-bottom:12px;font-size:.85em;color:var(--muted)}
.legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-inline-end:5px}

/* schedule */
.day-block{margin-bottom:22px}
.day-block h3{
  font-size:.95em;color:var(--accent);margin-bottom:8px;
  border-bottom:1px solid var(--border);padding-bottom:5px;
}
.day-matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:8px}
.sched-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 12px}
.sched-card .tag{font-size:.7em;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:4px}

/* knockout */
.ko-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.ko-round{min-width:265px;flex-shrink:0}
.ko-round>h3{
  text-align:center;font-size:.95em;color:var(--accent);
  background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:7px;margin-bottom:10px;
}
.ko-match{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:8px 10px;margin-bottom:10px;
}
.ko-match.final-match{border-color:var(--gold)}
.ko-match .meta{font-size:.7em;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px}
.ko-line{display:flex;align-items:center;gap:6px;padding:3px 0}
.ko-line .name{flex:1;display:flex;align-items:center;gap:6px;min-width:0;font-size:.93em}
.ko-line .name.tbd{color:var(--muted);font-size:.8em}
.ko-line .name.winner{font-weight:700;color:var(--green)}
.pen-row{display:flex;align-items:center;gap:6px;margin-top:5px;font-size:.78em;color:var(--muted);justify-content:center}
.podium{
  margin-top:18px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
}
.podium .pod{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 22px;text-align:center;min-width:150px;
}
.podium .pod .place{font-size:.78em;color:var(--muted);margin-bottom:4px}
.podium .pod .who{font-size:1.05em;font-weight:700}
.podium .pod.gold{border-color:var(--gold)} .podium .pod.gold .place{color:var(--gold)}

.pub-list{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.pub-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.pub-card .pub-main{flex:1;min-width:180px}
.pub-card .pub-author{font-weight:700;font-size:1em}
.pub-card .pub-title{color:var(--muted);font-size:.9em;margin-top:2px}
.pub-card .pub-meta{font-size:.78em;color:var(--muted);margin-top:4px}
.pub-card button{
  background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:8px 16px;font-size:.88em;cursor:pointer;font-family:inherit;
}
.pub-card button:hover{filter:brightness(1.08)}
.pub-view-bar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;margin-bottom:14px;
}
.pub-view-bar button{
  background:var(--card);color:var(--text);border:1px solid var(--border);
  border-radius:9px;padding:6px 12px;font-size:.88em;cursor:pointer;font-family:inherit;
}
.pub-setup{
  max-width:560px;margin:0 auto;background:var(--card);border:1px solid var(--amber);
  border-radius:14px;padding:16px 18px;line-height:1.6;font-size:.92em;
}
.pub-setup h3{color:var(--amber);margin-bottom:8px;font-size:1em}
.pub-setup ol{padding-inline-start:1.2em;margin:8px 0}
.pub-setup li{margin:4px 0}
.scen-bar button.pub{border-color:#2a5a3a;color:var(--green)}
.scen-bar button.pub:hover{background:#11241b;border-color:var(--green)}
.score.readonly{
  display:inline-block;min-width:38px;height:32px;line-height:32px;text-align:center;
  background:#0e1530;border:1px solid var(--border);border-radius:8px;font-size:1em;
}
.pub-loading{text-align:center;color:var(--muted);padding:24px}

@media(max-width:600px){
  .groups-grid{grid-template-columns:1fr}
  header h1{font-size:1.35em}
  .ko-round{min-width:240px}
}
</style>

/* ---------- standings logic ---------- */
function emptyStat(t){ return {team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0}; }
function computeStats(teams, matches){
  const st = {}; teams.forEach(t => st[t] = emptyStat(t));
  for(const m of matches){
    const r = res(m.n); if(!hasScore(m.n)) continue;
    const a = st[m.t1], b = st[m.t2];
    a.P++; b.P++; a.GF += r.a; a.GA += r.b; b.GF += r.b; b.GA += r.a;
    if(r.a > r.b){ a.W++; b.L++; a.Pts += 3; }
    else if(r.a < r.b){ b.W++; a.L++; b.Pts += 3; }
    else { a.D++; b.D++; a.Pts++; b.Pts++; }
  }
  Object.values(st).forEach(s => s.GD = s.GF - s.GA);
  return st;
}
function cmp3(a,b){ return b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF; }
function groupTable(g){
  const teams = GROUPS[g];
  const matches = GROUP_MATCHES.filter(m => m.g === g);
  const st = computeStats(teams, matches);
  const drawIdx = t => teams.indexOf(t);
  let arr = teams.map(t => st[t]).sort((a,b) => cmp3(a,b) || drawIdx(a.team) - drawIdx(b.team));
  // resolve ties on pts/GD/GF by head-to-head among the tied teams (FIFA criteria d-f)
  const out = [];
  for(let i = 0; i < arr.length;){
    let j = i + 1;
    while(j < arr.length && cmp3(arr[i], arr[j]) === 0) j++;
    const tied = arr.slice(i, j);
    if(tied.length > 1){
      const codes = new Set(tied.map(s => s.team));
      const sub = computeStats([...codes], matches.filter(m => codes.has(m.t1) && codes.has(m.t2)));
      tied.sort((a,b) => cmp3(sub[a.team], sub[b.team]) || drawIdx(a.team) - drawIdx(b.team));
    }
    out.push(...tied); i = j;
  }
  return out;
}
function groupComplete(g){
  return GROUP_MATCHES.filter(m => m.g === g).every(m => hasScore(m.n));
}
const ALL_GROUPS = Object.keys(GROUPS);
function allGroupsComplete(){ return ALL_GROUPS.every(groupComplete); }
function thirdsRanking(){
  // ranked third-placed teams of all 12 groups (pts, GD, GF, then group letter)
  const rows = ALL_GROUPS.map(g => {
    const t = groupTable(g)[2];
    return {g, ...t};
  });
  rows.sort((a,b) => cmp3(a,b) || (a.g < b.g ? -1 : 1));
  return rows;
}
function qualifiedThirdGroups(){
  if(!allGroupsComplete()) return null;
  return thirdsRanking().slice(0,8).map(r => r.g).sort();
}
function thirdSlotAssignment(){
  // returns {hostGroupLetter: thirdGroupLetter} or null
  const q = qualifiedThirdGroups();
  if(!q) return null;
  const val = ANNEX_C[q.join("")];
  if(!val) return null;
  const hosts = ["A","B","D","E","G","I","K","L"];
  const map = {};
  hosts.forEach((h,i) => map[h] = val[i]);
  return map;
}

/* ---------- knockout logic ---------- */
function koWinner(n){
  const m = KO_BY_N[n];
  const t1 = resolveSlot(m, m.s1), t2 = resolveSlot(m, m.s2);
  if(!t1 || !t2 || !hasScore(n)) return null;
  const r = res(n);
  if(r.a > r.b) return t1;
  if(r.a < r.b) return t2;
  if(Number.isInteger(r.pa) && Number.isInteger(r.pb) && r.pa !== r.pb)
    return r.pa > r.pb ? t1 : t2;
  return null;
}
function koLoser(n){
  const m = KO_BY_N[n];
  const w = koWinner(n);
  if(!w) return null;
  const t1 = resolveSlot(m, m.s1), t2 = resolveSlot(m, m.s2);
  return w === t1 ? t2 : t1;
}
function resolveSlot(m, src){
  if(src === "3"){
    const map = thirdSlotAssignment();
    if(!map) return null;
    const host = m.s1.slice(1); // "1X" host group
    const tg = map[host];
    return tg ? groupTable(tg)[2].team : null;
  }
  const kind = src[0];
  if(kind === "1" || kind === "2"){
    const g = src[1];
    if(!groupComplete(g)) return null;
    return groupTable(g)[+kind - 1].team;
  }
  const ref = +src.slice(1);
  return kind === "W" ? koWinner(ref) : koLoser(ref);
}

  return new Date(d + "T12:00:00").toLocaleDateString("he-IL", {day:"numeric", month:"numeric"});
}
function scoreInput(n, side, val){
  if(isReadOnly()){
    const v = Number.isInteger(val) ? val : "—";
    return `<span class="score readonly">${v}</span>`;
  }
  const v = Number.isInteger(val) ? val : "";
  return `<input class="score ${v!==""?"filled":""}" type="number" min="0" max="99" inputmode="numeric"
    value="${v}" data-match="${n}" data-side="${side}" aria-label="תוצאה">`;
}
function slotLabel(m, src){
  if(src === "3"){
    const host = m.s1.slice(1);
    const pool = m.pool.split("").join("/");
    return `מקום 3 (בית ${pool})`;
  }
  const kind = src[0], x = src.slice(1);
  if(kind === "1") return `מקום 1 בית ${x}`;
  if(kind === "2") return `מקום 2 בית ${x}`;
  if(kind === "W"){
    if(+x === 101 || +x === 102) return `מנצחת חצי הגמר ${+x - 100}`;
    return `מנצחת משחק ${x}`;
  }
  return `מפסידת חצי הגמר ${+x - 100}`;
}

/* ---------- rendering ---------- */
const TABS = [
  {id:"groups", label:"שלב הבתים"},
  {id:"schedule", label:"לוח משחקים"},
  {id:"thirds", label:"שלישיות"},
  {id:"bracket", label:"נוקאאוט"},
  {id:"community", label:"קהילה"},
];
let activeTab = localStorage.getItem("wc26-tab") || "groups";

function renderTabs(){
  const nav = document.getElementById("tabs");
  nav.innerHTML = TABS.map(t =>
    `<button class="${t.id===activeTab?"active":""}" data-tab="${t.id}">${t.label}</button>`
  ).join("") + `<button class="reset" id="resetBtn">איפוס</button>`;
}

function renderHeader(){
  const total = 104;
  const filled = filledCount();
  document.getElementById("progressFill").style.width = (filled/total*100) + "%";
  const viewLabel = viewingPublicId && activeTab === "community"
    ? (() => { const g = publicGuesses.find(x => x.id === viewingPublicId); return g ? ` · צופים בניחוש של ${g.author}` : ""; })()
    : "";
  document.getElementById("progressLabel").textContent = `הוזנו ${filled} מתוך ${total} משחקים${viewLabel}`;
  const champ = koWinner(104);
  document.getElementById("championBanner").innerHTML = champ
    ? `<div class="champion-banner">🏆 אלופת העולם 2026: ${TEAMS[champ].f} ${esc(TEAMS[champ].he)} 🏆</div>` : "";
  renderScenBar();
}

function renderScenBar(){
  const options = store.list.map(s =>
    `<option value="${s.id}" ${s.id === store.active ? "selected" : ""}>${esc(s.name)}</option>`
  ).join("");
  document.getElementById("scenBar").innerHTML = `
    <span class="scen-label">ניחוש:</span>
    <select id="scenSelect" aria-label="בחירת ניחוש">${options}</select>
    <button data-scen="new" title="יצירת ניחוש ריק חדש">+ חדש</button>
    <button data-scen="dup" title="העתקת הניחוש הנוכחי לניחוש נוסף">שכפול</button>
    <button data-scen="rename" title="שינוי שם הניחוש הנוכחי">שינוי שם</button>
    <button data-scen="del" class="danger" title="מחיקת הניחוש הנוכחי">מחיקה</button>
    <button data-scen="ai" class="ai" title="ניחוש מלא של ה-AI לכל 104 המשחקים — נוצר כניחוש חדש ונפרד">🤖 ניחוש ה-AI</button>
    ${firebaseReady ? `<button data-scen="pub" class="pub" title="פרסום הניחוש הנוכחי לכולם">📢 פרסם לקהילה</button>` : ""}`;
}

function standingsTable(g){
  const table = groupTable(g);
  const complete = groupComplete(g);
  let qThirds = null;
  if(allGroupsComplete()) qThirds = new Set(thirdsRanking().slice(0,8).map(r => r.g));
  const rows = table.map((s,i) => {
    let cls = "";
    if(complete){
      if(i < 2) cls = "q1";
      else if(i === 2 && qThirds && qThirds.has(g)) cls = "q3";
      else cls = "out";
    }
    return `<tr class="${cls}">
      <td class="pos">${i+1}</td>
      <td class="team-cell"><span class="flag">${TEAMS[s.team].f}</span> ${esc(TEAMS[s.team].he)}</td>
      <td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>
      <td>${s.GF}-${s.GA}</td><td>${s.GD>0?"+":""}${s.GD}</td><td class="pts">${s.Pts}</td>
    </tr>`;
  }).join("");
  return `<table class="standings">
    <thead><tr><th>#</th><th style="text-align:start">נבחרת</th><th>מש'</th><th>נ</th><th>ת</th><th>ה</th><th>שערים</th><th>הפרש</th><th>נק'</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function matchRowHtml(m){
  const r = res(m.n);
  return `<div class="match-row">
    <div class="match-meta">${fmtDateShort(m.d)}<br>${esc(CITY_HE[m.city] || m.city)}</div>
    <div class="team t1">${teamHtml(m.t1)}</div>
    <div class="score-box">${scoreInput(m.n,"a",r.a)}<span>:</span>${scoreInput(m.n,"b",r.b)}</div>
    <div class="team t2">${teamHtml(m.t2)}</div>
  </div>`;
}

function renderGroups(){
  const cards = ALL_GROUPS.map(g => {
    const ms = GROUP_MATCHES.filter(m => m.g === g).sort((a,b) => a.n - b.n);
    return `<div class="group-card">
      <h2><span>בית ${g}</span>${groupComplete(g) ? '<span class="done-tag">✓ הסתיים</span>' : ""}</h2>
      <div class="match-list">${ms.map(matchRowHtml).join("")}</div>
      ${standingsTable(g)}
    </div>`;
  }).join("");
  return `<div class="note">ירוק — עולות לשלב ה-32 · כתום — שלישית שמעפילה (נקבע כשכל הבתים מסתיימים)</div>
    <div class="groups-grid">${cards}</div>`;
}

function renderSchedule(){
  const all = [
    ...GROUP_MATCHES.map(m => ({...m, label:`בית ${m.g}`, type:"g"})),
    ...KO_MATCHES.map(m => ({...m, label:ROUND_NAMES[m.r], type:"k"})),
  ].sort((a,b) => a.d < b.d ? -1 : a.d > b.d ? 1 : a.n - b.n);
  const byDay = {};
  all.forEach(m => (byDay[m.d] = byDay[m.d] || []).push(m));
  return Object.entries(byDay).map(([d, ms]) => `
    <div class="day-block">
      <h3>${fmtDate(d)}</h3>
      <div class="day-matches">${ms.map(m => {
        const r = res(m.n);
        let body;
        if(m.type === "g"){
          body = `<div class="ko-line">
            <div class="name">${teamHtml(m.t1)}</div>
            <div class="score-box">${scoreInput(m.n,"a",r.a)}<span>:</span>${scoreInput(m.n,"b",r.b)}</div>
            <div class="name" style="justify-content:flex-end">${teamHtml(m.t2)}</div>
          </div>`;
        } else {
          body = koMatchBody(m, false);
        }
        return `<div class="sched-card">
          <div class="tag"><span>משחק ${m.n} · ${esc(m.label)}</span><span>${esc(CITY_HE[m.city] || m.city)}</span></div>
          ${body}</div>`;
      }).join("")}</div>
    </div>`).join("");
}

function renderThirds(){
  const ranking = thirdsRanking();
  const allDone = allGroupsComplete();
  const rows = ranking.map((s,i) => {
    const q = allDone && i < 8;
    const cls = allDone ? (q ? "q1" : "out") : "";
    return `<tr class="${cls}">
      <td class="pos">${i+1}</td>
      <td>${s.g}</td>
      <td class="team-cell"><span class="flag">${TEAMS[s.team].f}</span> ${esc(TEAMS[s.team].he)}</td>
      <td>${s.P}</td><td>${s.GF}-${s.GA}</td><td>${s.GD>0?"+":""}${s.GD}</td><td class="pts">${s.Pts}</td>
    </tr>`;
  }).join("");
  return `<div class="thirds-wrap">
    <div class="legend"><span><span class="dot" style="background:var(--green)"></span>8 הראשונות מעפילות לשלב ה-32</span></div>
    ${allDone ? "" : '<div class="note">הדירוג חלקי — יתקבע כשכל משחקי הבתים יוזנו</div>'}
    <table class="standings">
      <thead><tr><th>#</th><th>בית</th><th style="text-align:start">נבחרת</th><th>מש'</th><th>שערים</th><th>הפרש</th><th>נק'</th></tr></thead>
      <tbody>${rows}</tbody></table>
    <div class="note" style="margin-top:10px">שוברי שוויון: נקודות ← הפרש שערים ← שערי זכות (קריטריוני התנהגות ודירוג פיפ"א אינם מחושבים)</div>
  </div>`;
}

function koMatchBody(m, withMeta){
  const t1 = resolveSlot(m, m.s1), t2 = resolveSlot(m, m.s2);
  const r = res(m.n);
  const ready = t1 && t2;
  const w = ready ? koWinner(m.n) : null;
  const drawNeedsPens = ready && hasScore(m.n) && r.a === r.b;
  const line = (code, src, side, val) => `<div class="ko-line">
    <div class="name ${code ? (w && w === code ? "winner" : "") : "tbd"}">
      ${code ? teamHtml(code) : esc(slotLabel(m, src))}
    </div>
    ${ready ? scoreInput(m.n, side, val) : ""}
  </div>`;
  let html = line(t1, m.s1, "a", r.a) + line(t2, m.s2, "b", r.b);
  if(drawNeedsPens){
    if(isReadOnly()){
      html += `<div class="pen-row">פנדלים: ${Number.isInteger(r.pa)?r.pa:"—"} : ${Number.isInteger(r.pb)?r.pb:"—"}</div>`;
    }else{
      html += `<div class="pen-row">פנדלים:
      <input class="score pen" type="number" min="0" max="99" inputmode="numeric" value="${Number.isInteger(r.pa)?r.pa:""}" data-match="${m.n}" data-side="pa">
      <span>:</span>
      <input class="score pen" type="number" min="0" max="99" inputmode="numeric" value="${Number.isInteger(r.pb)?r.pb:""}" data-match="${m.n}" data-side="pb">
    </div>`;
    }
  }
  return html;
}

function renderBracket(){
  const order = [32, 16, 8, 4, 1, 3];
  const cols = order.map(r => {
    const ms = KO_MATCHES.filter(m => m.r === r);
    return `<div class="ko-round">
      <h3>${ROUND_NAMES[r]}</h3>
      ${ms.map(m => `<div class="ko-match ${m.r===1?"final-match":""}">
        <div class="meta"><span>משחק ${m.n}</span><span>${fmtDateShort(m.d)} · ${esc(m.city)}</span></div>
        ${koMatchBody(m, true)}
      </div>`).join("")}
    </div>`;
  }).join("");
  const champ = koWinner(104), runUp = koLoser(104), third = koWinner(103);
  let podium = "";
  if(champ){
    podium = `<div class="podium">
      <div class="pod gold"><div class="place">🏆 אלופת העולם</div><div class="who">${TEAMS[champ].f} ${esc(TEAMS[champ].he)}</div></div>
      <div class="pod"><div class="place">🥈 סגנית</div><div class="who">${TEAMS[runUp].f} ${esc(TEAMS[runUp].he)}</div></div>
      ${third ? `<div class="pod"><div class="place">🥉 מקום שלישי</div><div class="who">${TEAMS[third].f} ${esc(TEAMS[third].he)}</div></div>` : ""}
    </div>`;
  }
  const note = allGroupsComplete() ? "" :
    '<div class="note">משחקי השלישיות בעץ ייקבעו אוטומטית (לפי תקנון פיפ"א) לאחר השלמת כל משחקי הבתים</div>';
  return note + `<div class="ko-board">${cols}</div>` + podium;
}

function renderCommunitySetup(){
  return `<div class="pub-setup">
    <h3>הגדרת שיתוף קהילתי (פעם אחת)</h3>
    <p>כדי שכולם יוכלו לפרסם ולצפות בניחושים, צריך לחבר Firebase (חינמי):</p>
    <ol>
      <li>צור פרויקט ב-<a href="https://console.firebase.google.com" target="_blank" rel="noopener">Firebase Console</a></li>
      <li>הוסף Web App והעתק את ההגדרות ל-<code>firebase-config.js</code></li>
      <li>Firestore Database → Create → Start in <strong>test mode</strong> (זמני) או העתק את <code>firestore.rules</code> מהפרויקט</li>
      <li>העלה מחדש ל-GitHub Pages</li>
    </ol>
    <p style="margin-top:10px;color:var(--muted)">עד אז — הניחושים נשמרים רק במחשב שלך (localStorage).</p>
  </div>`;
}

function renderCommunityShell(){
  document.getElementById("view").innerHTML = `<div class="pub-loading">טוען ניחושים...</div>`;
}

function renderCommunity(){
  if(!firebaseReady) return renderCommunitySetup();
  if(viewingPublicId){
    const g = publicGuesses.find(x => x.id === viewingPublicId);
    if(!g) { viewingPublicId = null; return renderCommunity(); }
    const sub = `
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;justify-content:center">
        <button class="${communitySubTab==="groups"?"active":""}" data-csub="groups" style="background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:99px;padding:6px 14px;cursor:pointer;font-family:inherit">בתים</button>
        <button class="${communitySubTab==="bracket"?"active":""}" data-csub="bracket" style="background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:99px;padding:6px 14px;cursor:pointer;font-family:inherit">נוקאאוט</button>
      </div>`;
    let body = communitySubTab === "bracket" ? renderBracket() : renderGroups();
    return `<div class="pub-view-bar">
      <div><strong>${esc(g.author)}</strong> — ${esc(g.title)}<br>
      <span style="font-size:.82em;color:var(--muted)">${fmtTs(g.createdAt)} · ${g.matchCount || filledCount(g.results)}/104 משחקים</span></div>
      <button data-pub-back>← חזרה לרשימה</button>
    </div>${sub}${body}`;
  }
  if(pubLoading && publicGuesses.length === 0) return `<div class="pub-loading">טוען ניחושים מהקהילה...</div>`;
  if(publicGuesses.length === 0){
    return `<div class="note">עדיין אין ניחושים מפורסמים. לחץ <strong>📢 פרסם לקהילה</strong> למעלה כדי להיות הראשון!</div>`;
  }
  const cards = publicGuesses.map(g => `<div class="pub-card">
    <div class="pub-main">
      <div class="pub-author">${esc(g.author)}</div>
      <div class="pub-title">${esc(g.title)}</div>
      <div class="pub-meta">${fmtTs(g.createdAt)} · ${g.matchCount || 0}/104${g.champion ? " · 🏆 " + esc(g.champion) : ""}</div>
    </div>
    <button data-pub-view="${esc(g.id)}">צפייה</button>
  </div>`).join("");
  return `<div class="note">ניחושים שפורסמו על ידי משתמשים · ${publicGuesses.length} ניחושים</div>
    <div class="pub-list">${cards}</div>`;
}

let communitySubTab = "bracket";

function render(){
  renderHeader();
  renderTabs();
  const view = document.getElementById("view");
  if(activeTab === "groups") view.innerHTML = renderGroups();
  else if(activeTab === "schedule") view.innerHTML = renderSchedule();
  else if(activeTab === "thirds") view.innerHTML = renderThirds();
  else if(activeTab === "bracket") view.innerHTML = renderBracket();
  else if(activeTab === "community") view.innerHTML = renderCommunity();
}

/* ---------- events ---------- */
document.addEventListener("change", e => {
  const el = e.target;
  if(el.id === "scenSelect"){
    switchScen(el.value);
    return;
  }
  if(isReadOnly() || !el.matches("input.score")) return;
  const n = +el.dataset.match, side = el.dataset.side;
  const v = el.value === "" ? null : Math.max(0, Math.min(99, parseInt(el.value, 10)));
  results[n] = results[n] || {};
  if(v === null) delete results[n][side];
  else results[n][side] = v;
  if(Object.keys(results[n]).length === 0) delete results[n];
  save();
  render();
});
document.addEventListener("click", e => {
  const tabBtn = e.target.closest("[data-tab]");
  if(tabBtn){
    const next = tabBtn.dataset.tab;
    if(next !== "community"){ viewingPublicId = null; stopPublicSub(); }
    activeTab = next;
    localStorage.setItem("wc26-tab", activeTab);
    if(activeTab === "community" && firebaseReady) subscribePublicGuesses();
    else if(activeTab !== "community") stopPublicSub();
    render();
    return;
  }
  const csub = e.target.closest("[data-csub]");
  if(csub){ communitySubTab = csub.dataset.csub; render(); return; }
  if(e.target.closest("[data-pub-back]")){ backToPublicList(); return; }
  const pubView = e.target.closest("[data-pub-view]");
  if(pubView){ viewPublicGuess(pubView.dataset.pubView); return; }
  const scenBtn = e.target.closest("[data-scen]");
  if(scenBtn){
    const act = scenBtn.dataset.scen;
    if(act === "new") addScen(false);
    else if(act === "dup") addScen(true);
    else if(act === "rename") renameScen();
    else if(act === "del") deleteScen();
    else if(act === "ai") addAiScen();
    else if(act === "pub") publishGuess();
    return;
  }
  if(e.target.id === "resetBtn"){
    if(confirm(`לאפס את כל התוצאות בניחוש "${activeScen().name}"? (ניחושים אחרים לא יושפעו)`)){
      results = {};
      save();
      render();
    }
  }
});
/* keyboard: Enter moves to next empty score input */
document.addEventListener("keydown", e => {
  if(e.key === "Enter" && e.target.matches("input.score")){
    e.target.blur();
  }
});

render();
if(activeTab === "community" && firebaseReady) subscribePublicGuesses();
</script>
